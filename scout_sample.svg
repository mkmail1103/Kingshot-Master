<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <rect width="640" height="60" fill="#0f172a" fill-opacity="0.5"/>
  <text x="320" y="40" fill="#e2e8f0" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">偵察レポート</text>
  <g transform="translate(40, 100)">
    <rect width="560" height="80" rx="10" fill="#334155" stroke="#475569" stroke-width="2"/>
    <rect x="20" y="15" width="50" height="50" rx="25" fill="#475569"/>
    <rect x="90" y="25" width="200" height="12" rx="4" fill="#94a3b8"/>
    <rect x="90" y="45" width="150" height="10" rx="4" fill="#64748b"/>
    <text x="450" y="48" fill="#e2e8f0" font-family="monospace" font-size="20" font-weight="bold" text-anchor="end">1,234,567</text>
    <g transform="translate(480, 20)">
        <circle cx="20" cy="20" r="16" fill="#ef4444" stroke="#fca5a5" stroke-width="2"/>
        <text x="20" y="28" fill="white" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">!</text>
    </g>
  </g>
  <g transform="translate(360, 140)" filter="url(#shadow)">
     <path d="M140 0 L150 20 H 200 A 10 10 0 0 1 210 30 V 100 A 10 10 0 0 1 200 110 H 20 A 10 10 0 0 1 10 100 V 30 A 10 10 0 0 1 20 20 H 140 Z" fill="#f8fafc"/>
     <text x="110" y="50" fill="#334155" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">歩兵 (盾)</text>
     <text x="110" y="80" fill="#0f172a" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">42.5%</text>
  </g>
  <text x="320" y="320" fill="#94a3b8" font-family="sans-serif" font-size="16" text-anchor="middle">この「％」が表示されている状態を撮影</text>
</svg>